<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Clicker — Metronome</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>&#9654;</text></svg>" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <h1>Clicker</h1>
      </div>
      <nav class="tabs" role="tablist">
        <button class="tab active" data-screen="metronome" role="tab" aria-selected="true">Metronome</button>
        <button class="tab" data-screen="tracks" role="tab" aria-selected="false">Tracks</button>
      </nav>
    </header>

    <!-- ============ Screen: Metronome (mode 1) ============ -->
    <main id="screen-metronome" class="screen active">
      <section class="metro-card">
        <div class="tempo-display">
          <button class="tempo-nudge" id="bpm-down" aria-label="Decrease tempo">&minus;</button>
          <div class="tempo-value">
            <input id="bpm-input" type="number" inputmode="numeric" min="20" max="300" value="120" aria-label="Tempo in BPM" />
            <span class="tempo-unit">BPM</span>
          </div>
          <button class="tempo-nudge" id="bpm-up" aria-label="Increase tempo">+</button>
        </div>

        <input id="bpm-slider" class="slider" type="range" min="20" max="300" value="120" step="1" aria-label="Tempo slider" />

        <div class="metro-row">
          <div class="field">
            <label for="metro-num">Beats</label>
            <select id="metro-num" aria-label="Beats per measure"></select>
          </div>
          <div class="timesig-slash">/</div>
          <div class="field">
            <label for="metro-den">Note</label>
            <select id="metro-den" aria-label="Beat note value">
              <option value="2">2</option>
              <option value="4" selected>4</option>
              <option value="8">8</option>
              <option value="16">16</option>
            </select>
          </div>
          <button id="tap-tempo" class="btn ghost tap">Tap</button>
        </div>

        <div id="metro-beats" class="beat-dots" aria-hidden="true"></div>

        <button id="metro-play" class="play-btn" aria-label="Play or stop metronome">
          <svg class="icon-play" viewBox="0 0 24 24" width="34" height="34"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
          <svg class="icon-stop" viewBox="0 0 24 24" width="30" height="30"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
        </button>
        <p class="hint">Space to play / stop &middot; &uarr;&darr; to change tempo</p>
      </section>
    </main>

    <!-- ============ Screen: Tracks list (mode 2) ============ -->
    <main id="screen-tracks" class="screen">
      <div class="screen-head">
        <h2>Your tracks</h2>
        <button id="new-track" class="btn primary">+ New track</button>
      </div>
      <div id="track-list" class="track-list"></div>
      <div id="tracks-empty" class="empty-state hidden">
        <div class="empty-art">&#119136;&#119136;&#119136;</div>
        <p>No tracks yet.</p>
        <p class="muted">A track is a sequence of sections, each with its own tempo, time signature and length. Build one and export it as MIDI.</p>
        <button id="empty-new-track" class="btn primary">Create your first track</button>
      </div>
    </main>

    <!-- ============ Screen: Track editor ============ -->
    <main id="screen-editor" class="screen">
      <div class="screen-head editor-head">
        <button id="editor-back" class="btn ghost back">&larr; Tracks</button>
        <input id="track-name" class="track-name-input" type="text" placeholder="Untitled track" maxlength="60" aria-label="Track name" />
        <div class="editor-head-meta">
          <span id="editor-duration" class="pill">0:00</span>
        </div>
      </div>

      <div id="section-list" class="section-list"></div>

      <button id="add-section" class="add-section">+ Add section</button>

      <div class="editor-actions">
        <button id="editor-play" class="btn ghost wide">
          <svg class="icon-play" viewBox="0 0 24 24" width="18" height="18"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
          <svg class="icon-stop" viewBox="0 0 24 24" width="18" height="18"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
          <span id="editor-play-label">Preview</span>
        </button>
        <button id="editor-export" class="btn ghost wide">&#8681; MIDI</button>
        <button id="editor-save" class="btn primary wide">Save</button>
      </div>
      <div id="editor-progress" class="editor-progress hidden">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <span id="progress-label"></span>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" role="status"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
